<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌸 피부 타입 진단</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fdf4ff 0%, #fce7f3 50%, #ede9fe 100%);
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: white; border-radius: 32px;
      padding: 40px 28px;
      box-shadow: 0 20px 60px rgba(219,39,119,0.15);
    }
    h1 { font-size: 24px; font-weight: 800; color: #1a1a2e; line-height: 1.3; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 14px; line-height: 1.7; margin-bottom: 20px; }
    .badge {
      background: linear-gradient(135deg, #fce7f3, #ede9fe);
      border-radius: 16px; padding: 14px;
      font-size: 13px; color: #6b21a8; font-weight: 600;
      margin-bottom: 28px; text-align: center;
    }
    .btn-main {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white; border: none; border-radius: 20px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 24px rgba(236,72,153,0.4);
    }
    .progress-bar-wrap {
      height: 8px; background: #f3f4f6; border-radius: 100px;
      margin-bottom: 24px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ec4899, #8b5cf6);
      border-radius: 100px; transition: width 0.4s;
    }
    .progress-text {
      display: flex; justify-content: space-between;
      font-size: 13px; color: #6b7280; font-weight: 600;
      margin-bottom: 8px;
    }
    .question-emoji { font-size: 48px; text-align: center; margin-bottom: 14px; }
    .question-text {
      font-size: 20px; font-weight: 700; color: #1a1a2e;
      text-align: center; margin-bottom: 28px; line-height: 1.4;
    }
    .option {
      width: 100%; padding: 16px 20px;
      border-radius: 16px; border: 2px solid #f3f4f6;
      background: #f9fafb; color: #374151;
      font-size: 15px; font-weight: 500;
      cursor: pointer; text-align: left;
      margin-bottom: 12px; transition: all 0.2s;
    }
    .option.selected {
      border-color: #ec4899;
      background: linear-gradient(135deg, #fce7f3, #ede9fe);
      color: #be185d; font-weight: 700;
    }
    .btn-next {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white; border: none; border-radius: 16px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-top: 8px;
    }
    .btn-next:disabled {
      background: #e5e7eb; color: #9ca3af; cursor: not-allowed;
    }
    .result-header {
      text-align: center; padding: 32px 0 24px;
    }
    .result-emoji { font-size: 60px; margin-bottom: 12px; }
    .result-badge {
      display: inline-block; border-radius: 100px;
      padding: 6px 20px; font-size: 13px; font-weight: 700;
      color: white; margin-bottom: 12px;
    }
    .result-type { font-size: 28px; font-weight: 800; color: #1a1a2e; margin-bottom: 10px; }
    .result-desc { color: #4b5563; font-size: 14px; line-height: 1.7; }
    .ai-box {
      background: linear-gradient(135deg, #fdf4ff, #fce7f3);
      border-radius: 20px; padding: 20px;
      border: 1px solid #f9a8d4; margin-bottom: 24px;
    }
    .ai-label { font-size: 13px; font-weight: 700; color: #be185d; margin-bottom: 10px; }
    .ai-text { color: #374151; font-size: 14px; line-height: 1.8; }
    .loading { display: flex; align-items: center; gap: 8px; color: #9ca3af; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #f9a8d4; border-top-color: #ec4899;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .products-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; }
    .product-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: #f9fafb;
      border-radius: 16px; border: 1px solid #f3f4f6;
      margin-bottom: 10px;
    }
    .product-icon { font-size: 28px; }
    .product-name { font-weight: 700; color: #1a1a2e; font-size: 14px; }
    .product-reason { color: #6b7280; font-size: 12px; margin-top: 2px; }
    .tip-box {
      border-radius: 16px; padding: 16px;
      margin-bottom: 24px; border-left: 4px solid;
    }
    .tip-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .tip-text { color: #374151; font-size: 13px; line-height: 1.7; }
    .btn-consult {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      color: white; border: none; border-radius: 20px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(236,72,153,0.35);
    }
    .btn-retry {
      width: 100%; padding: 14px;
      background: transparent; color: #9ca3af;
      border: 2px solid #e5e7eb; border-radius: 16px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    #start-screen, #quiz-screen, #result-screen { display: none; }
  </style>
</head>
<body>
<div class="card" id="app">

  <!-- START -->
  <div id="start-screen">
    <div style="text-align:center">
      <div style="font-size:64px;margin-bottom:16px">🌸</div>
      <h1>나의 피부 타입은<br>무엇일까요?</h1>
      <p class="subtitle">5가지 질문으로 피부 타입을 진단하고<br>맞춤 암웨이 제품을 추천받으세요</p>
      <div class="badge">✨ AI가 실시간으로 개인 맞춤 조언을 드려요</div>
      <button class="btn-main" onclick="startQuiz()">진단 시작하기 →</button>
      <p style="color:#9ca3af;font-size:12px;margin-top:16px">소요시간 약 1분 · 완전 무료</p>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="progress-text">
      <span id="progress-label">질문 1 / 5</span>
      <span id="progress-pct">20%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:20%"></div>
    </div>
    <div class="question-emoji" id="q-emoji">🌅</div>
    <div class="question-text" id="q-text"></div>
    <div id="options-wrap"></div>
    <button class="btn-next" id="btn-next" disabled onclick="nextQuestion()">다음 질문 →</button>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <div class="result-header" id="result-header"></div>
    <div class="ai-box">
      <div class="ai-label">🤖 AI 맞춤 조언</div>
      <div class="ai-text" id="ai-text">
        <div class="loading"><div class="spinner"></div><span>AI가 분석 중이에요...</span></div>
      </div>
    </div>
    <div class="products-title">🛍️ 맞춤 추천 제품</div>
    <div id="products-wrap"></div>
    <div class="tip-box" id="tip-box">
      <div class="tip-label" id="tip-label">💡 전문가 TIP</div>
      <div class="tip-text" id="tip-text"></div>
    </div>
    <button class="btn-consult" onclick="alert('카카오톡 링크나 전화번호를 여기에 연결하세요!')">💬 전문가 1:1 무료 상담받기</button>
    <button class="btn-retry" onclick="startQuiz()">다시 진단하기</button>
  </div>

</div>

<script>
const QUESTIONS = [
  { emoji:"🌅", text:"세안 후 30분 뒤 피부 상태는?",
    options:[{l:"당기고 건조해요",v:"dry"},{l:"촉촉하게 유지돼요",v:"normal"},{l:"T존만 번들거려요",v:"combo"},{l:"전체적으로 번들거려요",v:"oily"}]},
  { emoji:"🔍", text:"모공이 눈에 띄는 부위는?",
    options:[{l:"거의 없어요",v:"dry"},{l:"약간 있어요 (코 주변)",v:"normal"},{l:"T존(이마·코)에 집중",v:"combo"},{l:"얼굴 전체에 넓어요",v:"oily"}]},
  { emoji:"☀️", text:"오후 2시 즈음 피부 상태는?",
    options:[{l:"더 건조하고 당겨요",v:"dry"},{l:"아침과 비슷해요",v:"normal"},{l:"T존만 기름져요",v:"combo"},{l:"화장이 다 지워져요",v:"oily"}]},
  { emoji:"🌙", text:"가장 신경 쓰이는 피부 고민은?",
    options:[{l:"건조함·각질·당김",v:"dry"},{l:"칙칙함·잡티",v:"normal"},{l:"T존 트러블·U존 건조",v:"combo"},{l:"과도한 피지·여드름",v:"oily"}]},
  { emoji:"💧", text:"현재 스킨케어 루틴은?",
    options:[{l:"보습 위주로 많이 발라요",v:"dry"},{l:"기본 케어만 해요",v:"normal"},{l:"부위별로 다르게 케어해요",v:"combo"},{l:"최대한 가볍게 써요",v:"oily"}]}
];

const RESULTS = {
  dry:    { type:"건성 피부", emoji:"🌸", accent:"#e11d48", tipColor:"#fce7f3",
            desc:"수분 공급과 장벽 강화가 핵심이에요.",
            products:[{icon:"💆",name:"아티스트리 하이드라 수분크림",reason:"24시간 수분 지속"},{icon:"✨",name:"뉴트리라이트 콜라겐 플러스",reason:"피부 탄력·수분 보충"},{icon:"💎",name:"아티스트리 세럼",reason:"피부 장벽 강화"}],
            tip:"세안 후 3분 안에 스킨케어를 완료하세요!" },
  normal: { type:"중성 피부", emoji:"🌿", accent:"#059669", tipColor:"#d1fae5",
            desc:"균형 잡힌 피부 타입이에요! 현재 상태를 유지하면서 안티에이징에 집중하면 완벽해요.",
            products:[{icon:"⏰",name:"아티스트리 타임 디파이언스",reason:"노화 예방·탄력 유지"},{icon:"🍊",name:"뉴트리라이트 비타민C",reason:"피부 톤 개선·항산화"},{icon:"☀️",name:"아티스트리 선크림 SPF50",reason:"자외선 차단"}],
            tip:"중성 피부의 최대 적은 방심이에요. 꾸준한 자외선 차단으로 오래 유지하세요!" },
  combo:  { type:"복합성 피부", emoji:"🌺", accent:"#d97706", tipColor:"#fef3c7",
            desc:"T존과 U존이 다른 복합성! 부위별 맞춤 케어가 핵심이에요.",
            products:[{icon:"⚖️",name:"아티스트리 밸런싱 토너",reason:"피지·수분 밸런스 조절"},{icon:"🌱",name:"뉴트리라이트 비오틴 플러스",reason:"피부 균형·모공 관리"},{icon:"💨",name:"아티스트리 경량 모이스처라이저",reason:"가볍게 촉촉하게"}],
            tip:"T존엔 젤 타입, U존엔 크림 타입을 따로 사용하세요!" },
  oily:   { type:"지성 피부", emoji:"✨", accent:"#7c3aed", tipColor:"#ede9fe",
            desc:"피지 조절이 핵심이에요. 하지만 과도한 세안은 오히려 피지를 더 늘릴 수 있어요!",
            products:[{icon:"🫧",name:"아티스트리 퓨리파잉 폼 클렌저",reason:"모공 속 피지 제거"},{icon:"⚡",name:"뉴트리라이트 아연 & 비타민B",reason:"피지 분비 조절"},{icon:"🎯",name:"아티스트리 매트 컨트롤 세럼",reason:"번들거림 억제"}],
            tip:"수분이 부족하면 피지가 더 나와요. 오일-프리 수분크림으로 꼭 보습하세요!" }
};

let current = 0, answers = [], selected = null;

function show(id) {
  ['start-screen','quiz-screen','result-screen'].forEach(s => document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='block';
}

function startQuiz() {
  current = 0; answers = []; selected = null;
  show('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const pct = Math.round(((current+1)/5)*100);
  document.getElementById('progress-label').textContent = `질문 ${current+1} / 5`;
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;
  selected = null;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = current===4 ? '결과 보기 ✨' : '다음 질문 →';
  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.l;
    btn.onclick = () => {
      document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = opt.v;
      document.getElementById('btn-next').disabled = false;
    };
    wrap.appendChild(btn);
  });
}

function nextQuestion() {
  answers.push(selected);
  if (current < 4) { current++; renderQuestion(); }
  else showResult();
}

function getResultKey() {
  const c = {dry:0,normal:0,combo:0,oily:0};
  answers.forEach(a => c[a]++);
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
}

async function showResult() {
  show('result-screen');
  const key = getResultKey();
  const r = RESULTS[key];

  document.getElementById('result-header').innerHTML = `
    <div class="result-emoji">${r.emoji}</div>
    <span class="result-badge" style="background:${r.accent}">진단 결과</span>
    <div class="result-type">${r.type}</div>
    <div class="result-desc">${r.desc}</div>
  `;

  const pw = document.getElementById('products-wrap');
  pw.innerHTML = r.products.map(p=>`
    <div class="product-item">
      <span class="product-icon">${p.icon}</span>
      <div><div class="product-name">${p.name}</div><div class="product-reason">${p.reason}</div></div>
    </div>`).join('');

  const tb = document.getElementById('tip-box');
  tb.style.background = r.tipColor;
  tb.style.borderLeftColor = r.accent;
  document.getElementById('tip-label').style.color = r.accent;
  document.getElementById('tip-text').textContent = r.tip;

  // AI 호출
  try {
    const concerns = answers.map((a,i)=>QUESTIONS[i].options.find(o=>o.v===a)?.l).join(', ');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`당신은 암웨이 뷰티 전문 상담사입니다. 고객 피부 타입에 맞춘 친근하고 전문적인 조언을 200자 이내로 이모지 포함해서 작성하세요.`,
        messages:[{role:'user',content:`피부타입: ${r.type}\n고민: ${concerns}\n맞춤 조언을 해주세요.`}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || '';
    document.getElementById('ai-text').textContent = text || '피부 분석 완료! 추천 제품으로 꾸준히 관리해보세요 ✨';
  } catch {
    document.getElementById('ai-text').textContent = '피부 분석 완료! 추천 제품으로 꾸준히 관리해보세요 ✨';
  }
}

// 시작화면 보여주기
show('start-screen');
</script>
</body>
</html>
