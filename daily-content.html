<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>오늘의 SNS 콘텐츠</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{--bg:#faf8f5;--card:#fff;--card2:#f5f3ef;--border:#e8e4dc;--text:#1a1814;--sub:#8a8278;--accent:#c4792a;--accent2:#e8a855;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:32px 20px 60px;}
.container{max-width:480px;margin:0 auto;}
.header{margin-bottom:24px;}
.date-row{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;}
.today-date{font-size:32px;font-weight:800;}
.today-day{font-size:13px;color:var(--sub);}
.theme-row{display:flex;align-items:center;gap:8px;}
.theme-name{font-size:15px;font-weight:700;color:var(--accent);}
.theme-desc{font-size:12px;color:var(--sub);}
.tomorrow-banner{border:1px dashed var(--border);border-radius:12px;padding:12px 16px;background:var(--card2);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.tomorrow-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;}
.tomorrow-theme{font-size:13px;font-weight:700;color:var(--text);margin-top:2px;}
.tomorrow-photo{font-size:11px;color:var(--sub);margin-top:2px;}
.photo-guide{border:1px solid var(--border);border-radius:14px;padding:14px 18px;background:var(--card);margin-bottom:20px;display:flex;gap:10px;}
.photo-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.photo-tags{display:flex;flex-wrap:wrap;gap:5px;}
.photo-tag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--card2);color:var(--sub);border:1px solid var(--border);}
.gen-btn{width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:24px;box-shadow:0 4px 16px rgba(196,121,42,0.3);}
.gen-btn:disabled{opacity:0.6;cursor:not-allowed;}
.tabs{display:none;gap:8px;margin-bottom:16px;}
.tabs.show{display:flex;}
.tab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--sub);}
.tab.active{border-color:var(--accent);color:var(--accent);background:#fdf5ec;}
.content-card{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--card);display:none;margin-bottom:12px;}
.content-card.show{display:block;}
.card-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.platform-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.kakao-icon{background:#FEE500;}
.insta-icon{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
.platform-name{font-size:13px;font-weight:700;}
.platform-sub{font-size:11px;color:var(--sub);}
.card-body{padding:18px;}
.content-text{font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;min-height:80px;}
.card-footer{padding:12px 18px;border-top:1px solid var(--border);background:var(--card2);}
.copy-btn{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.copy-btn.copied{background:var(--accent);color:white;border-color:var(--accent);}
.loading-wrap{padding:24px;text-align:center;color:var(--sub);font-size:14px;}
.dots span{animation:blink 1.4s infinite both;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
.regen-btn{width:100%;padding:12px;border:1px dashed var(--border);border-radius:12px;background:transparent;color:var(--sub);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:none;margin-bottom:20px;}
.tip-box{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:var(--card2);font-size:12px;color:var(--sub);line-height:1.7;display:none;}
.tip-box strong{color:var(--accent);}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="date-row"><div class="today-date" id="todayDate"></div><div class="today-day" id="todayDay"></div></div>
<div class="theme-row"><span id="themeEmoji" style="font-size:20px"></span><span class="theme-name" id="themeName"></span><span class="theme-desc" id="themeDesc"></span></div>
</div>
<div class="tomorrow-banner">
<div id="tomorrowEmoji" style="font-size:18px"></div>
<div><div class="tomorrow-label">내일 미리보기</div><div class="tomorrow-theme" id="tomorrowTheme"></div><div class="tomorrow-photo" id="tomorrowPhoto"></div></div>
</div>
<div class="photo-guide">
<div style="font-size:20px">📸</div>
<div style="flex:1"><div class="photo-label">오늘의 추천 사진</div><div class="photo-tags" id="photoTags"></div></div>
</div>
<button class="gen-btn" id="genBtn" onclick="generateAll()">✦ 오늘의 콘텐츠 생성하기</button>
<div class="tabs" id="tabRow">
<button class="tab active" onclick="switchTab('kakao')" id="tabKakao">💬 카카오톡용</button>
<button class="tab" onclick="switchTab('insta')" id="tabInsta">📷 인스타그램용</button>
</div>
<div class="content-card" id="kakaoCard">
<div class="card-header"><div class="platform-icon kakao-icon">💬</div><div><div class="platform-name">카카오톡용</div><div class="platform-sub">단톡방 · 1:1 전송용</div></div></div>
<div class="card-body"><div class="content-text" id="kakaoText"></div></div>
<div class="card-footer"><button class="copy-btn" onclick="copyContent('kakaoText',this)">카카오톡에 복사하기</button></div>
</div>
<div class="content-card" id="instaCard">
<div class="card-header"><div class="platform-icon insta-icon">📷</div><div><div class="platform-name">인스타그램용</div><div class="platform-sub">피드 · 스토리용</div></div></div>
<div class="card-body"><div class="content-text" id="instaText"></div></div>
<div class="card-footer"><button class="copy-btn" onclick="copyContent('instaText',this)">인스타그램에 복사하기</button></div>
</div>
<button class="regen-btn" id="regenBtn" onclick="generateAll()">↺ 다른 내용으로 다시 생성</button>
<div class="tip-box" id="tipBox"><strong>💡 오늘의 활용 팁</strong><br><span id="tipText"></span></div>
</div>
<script>
const DATA=[
{theme:"암웨이 정보",emoji:"💼",desc:"스토리형",photoTags:["제품컷","비포애프터","클로즈업","플랫레이"],tip:"제품 사진과 함께 올리면 클릭률이 3배 높아요!",kakao:"암웨이 제품을 사용한 실제 경험을 카카오톡 단톡방에 보낼 형식으로 작성. 친구에게 말하듯 자연스럽고 따뜻하게. 광고티 없이. 이모지 2-3개. 5줄 이내.",insta:"암웨이 제품을 감성적인 스토리 형식으로 인스타그램 게시물 작성. 자연스럽게 제품 장점 소개. 해시태그 7개 포함. 6-8줄."},
{theme:"건강 정보",emoji:"🌿",desc:"정보형",photoTags:["건강식품","채소과일","운동일상","영양제"],tip:"번호로 정리된 건강 정보는 저장·공유율이 높아요!",kakao:"건강에 관한 유익한 정보를 카카오톡 단톡방용으로 작성. 번호로 3가지 팁 정리. 친근하게. 이모지 포함. 5줄 이내.",insta:"건강 정보를 인스타그램 카드뉴스 캡션 형식으로 작성. 1,2,3 항목으로 정리. 뉴트리라이트 자연스럽게 연결. 해시태그 7개 포함."},
{theme:"유머 & 공감",emoji:"😄",desc:"간결형",photoTags:["공감짤","일상유머","귀여운동물","웃긴순간"],tip:"유머 게시물은 짧을수록 좋아요!",kakao:"일상에서 공감되는 재치있는 유머를 카카오톡용으로 작성. 3줄 이내로 짧고 임팩트있게. 암웨이와 자연스럽게 연결. 웃음 이모지 포함.",insta:"공감 유머를 인스타그램용으로 작성. 짧고 재치있게. 댓글 유도 질문 포함. 해시태그 5개. 4줄 이내."},
{theme:"힐링 & 위로",emoji:"🌸",desc:"감성형",photoTags:["자연풍경","꽃사진","노을","따뜻한카페"],tip:"힐링 콘텐츠는 저녁 8-10시에 올리면 반응이 제일 좋아요!",kakao:"마음이 따뜻해지는 위로의 말을 카카오톡용으로 작성. 오늘 하루 수고한 사람들에게. 진심어리게. 4줄 이내.",insta:"힐링이 되는 감성 글을 인스타그램용으로 작성. 시적이고 따뜻하게. 아티스트리 스킨케어와 자연스럽게 연결. 해시태그 7개."},
{theme:"꿈 & 도전",emoji:"⭐",desc:"동기부여형",photoTags:["일출하늘","목표보드","도전일상","성취순간"],tip:"금요일 동기부여 콘텐츠는 주말 계획을 세우는 사람들에게 반응이 좋아요!",kakao:"꿈과 목표에 관한 동기부여 메시지를 카카오톡용으로 작성. 에너지 넘치게. 암웨이 사업 기회와 자연스럽게 연결. 5줄 이내.",insta:"꿈과 도전에 관한 강렬한 동기부여 글을 인스타그램용으로 작성. 행동을 촉구하는 마무리. 해시태그 8개 포함."},
{theme:"라이프스타일",emoji:"🎉",desc:"사진중심형",photoTags:["주말나들이","가족사진","맛집","취미활동"],tip:"토요일은 일상 사진과 짧은 캡션이 제일 좋아요!",kakao:"즐거운 주말 일상을 카카오톡용으로 작성. 사진 설명하듯 짧게 2-3줄. 친근하게. 주말 안부 인사 포함.",insta:"주말 라이프스타일을 인스타그램 캡션으로 작성. 감성 캡션. 해시태그 8개. 3줄 이내."},
{theme:"감사 & 일상",emoji:"🙏",desc:"사진중심형",photoTags:["소소한행복","커피한잔","햇살일상","가족"],tip:"일요일 감사 콘텐츠는 한 주를 마무리하는 느낌으로!",kakao:"이번 한 주의 감사한 순간을 카카오톡용으로 작성. 소소한 일상의 감사함. 따뜻하게. 3줄 이내.",insta:"일상의 감사함을 인스타그램용으로 작성. 진심어리게 짧게. 팔로워도 감사함을 나누게 유도. 해시태그 6개."}
];
const now=new Date();
const dIdx=now.getDay();
const ti=dIdx===0?6:dIdx-1;
const tmi=(ti+1)%7;
const d=DATA[ti],dt=DATA[tmi];
const KR=['일','월','화','수','목','금','토'];
const M=now.getMonth()+1,D=now.getDate();
document.getElementById('todayDate').textContent=M+'월 '+D+'일';
document.getElementById('todayDay').textContent=KR[dIdx]+'요일';
document.getElementById('themeEmoji').textContent=d.emoji;
document.getElementById('themeName').textContent=d.theme;
document.getElementById('themeDesc').textContent='· '+d.desc;
document.getElementById('photoTags').innerHTML=d.photoTags.map(function(t){return '<span class="photo-tag">'+t+'</span>';}).join('');
const tmr=new Date(now);tmr.setDate(tmr.getDate()+1);
document.getElementById('tomorrowEmoji').textContent=dt.emoji;
document.getElementById('tomorrowTheme').textContent=KR[tmr.getDay()]+'요일 · '+dt.theme+' ('+dt.desc+')';
document.getElementById('tomorrowPhoto').textContent='📸 '+dt.photoTags.join(', ');
async function ai(prompt){
const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:'암웨이 뷰티컨설턴트 SNS 콘텐츠 전문가. 친근한 한국어. 광고티 없이. 진정성있게. 오늘: '+M+'월 '+D+'일 '+KR[dIdx]+'요일',messages:[{role:'user',content:prompt+' 암웨이 뷰티컨설턴트로서 작성.'}]})});
const data=await r.json();
return data.content&&data.content.map(function(c){return c.text||'';}).join('')||'생성 실패. 다시 시도해주세요.';
}
async function generateAll(){
const btn=document.getElementById('genBtn');
btn.disabled=true;btn.textContent='생성 중...';
const loading='<div class="loading-wrap">AI가 작성 중이에요 <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>';
document.getElementById('tabRow').classList.add('show');
document.getElementById('kakaoCard').classList.add('show');
document.getElementById('instaCard').classList.remove('show');
document.getElementById('tabKakao').classList.add('active');
document.getElementById('tabInsta').classList.remove('active');
document.getElementById('kakaoText').innerHTML=loading;
document.getElementById('instaText').innerHTML=loading;
document.getElementById('regenBtn').style.display='none';
document.getElementById('tipBox').style.display='none';
try{
const results=await Promise.all([ai(d.kakao),ai(d.insta)]);
document.getElementById('kakaoText').textContent=results[0];
document.getElementById('instaText').textContent=results[1];
document.getElementById('tipText').textContent=d.tip;
document.getElementById('tipBox').style.display='block';
document.getElementById('regenBtn').style.display='block';
}catch(e){
document.getElementById('kakaoText').textContent='오류 발생. 다시 시도해주세요.';
document.getElementById('regenBtn').style.display='block';
}
btn.disabled=false;btn.textContent='✦ 오늘의 콘텐츠 생성하기';
}
function switchTab(tab){
document.getElementById('kakaoCard').classList.toggle('show',tab==='kakao');
document.getElementById('instaCard').classList.toggle('show',tab==='insta');
document.getElementById('tabKakao').classList.toggle('active',tab==='kakao');
document.getElementById('tabInsta').classList.toggle('active',tab==='insta');
}
function copyContent(id,btn){
navigator.clipboard.writeText(document.getElementById(id).textContent).then(function(){
btn.textContent='복사 완료! ✓';btn.classList.add('copied');
setTimeout(function(){btn.textContent=id==='kakaoText'?'카카오톡에 복사하기':'인스타그램에 복사하기';btn.classList.remove('copied');},2000);
});
}
</script>
</body>
</html>
